apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: waste-backend-ingress
  namespace: waste-mlops
  labels:
    app.kubernetes.io/name: waste-backend
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: waste-mlops
spec:
  ingressClassName: nginx
  rules:
    - host: waste.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: waste-backend
                port:
                  number: 80
