name: Run tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi \
            uvicorn \
            python-multipart \
            sqlalchemy \
            psycopg2-binary \
            pillow \
            python-json-logger \
            pytest \
            httpx

      - name: Run tests
        env:
          DATABASE_URL: sqlite:///./tests/github_actions.db
        run: python -m pytest -q
